name: Revisar recordatorios escolares

on:
  schedule:
    # Corre cada 5 minutos. GitHub no garantiza el minuto exacto (puede
    # atrasarse un poco en horas de alta demanda), por eso el script
    # usa una ventana de 15 min antes a 5 min después de la hora programada.
    - cron: '*/5 * * * *'
  workflow_dispatch: {} # permite correrlo manualmente desde la pestaña "Actions"

jobs:
  revisar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        working-directory: scripts
        run: npm install

      - name: Revisar recordatorios y enviar notificaciones
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node check-recordatorios.js
