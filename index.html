    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; color: #1a1a1a; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .header { background: #1b5e20; color: white; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 10px 20px; background: #e0e0e0; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab.active { background: #1b5e20; color: white; }
        .panel { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .chat-messages { height: 400px; overflow-y: auto; border: 1px solid #ccc; border-radius: 10px; padding: 15px; margin-bottom: 15px; background: #fafafa; }
        .msg { margin-bottom: 15px; display: flex; align-items: flex-start; gap: 10px; }
        .user-msg { justify-content: flex-end; }
        .assistant-msg { justify-content: flex-start; }
        .avatar { font-size: 2rem; min-width: 40px; text-align: center; }
        .bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; word-wrap: break-word; }
        .user-bubble { background: #bbdefb; color: #0d47a1; }
        .assistant-bubble { background: #e8f5e9; color: #1b5e20; }
        .system-bubble { background: #fff3e0; color: #e65100; font-style: italic; }
        input, textarea, select, button { padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 0.95rem; }
        button { background: #1b5e20; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #2e7d32; }
        .btn-note { background: #f57c00; }
        .btn-note:hover { background: #e65100; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .subtab { display: inline-block; padding: 8px 15px; background: #e0e0e0; border-radius: 15px; cursor: pointer; margin-right: 10px; margin-bottom: 5px; }
        .subtab.active { background: #1b5e20; color: white; }
        .table-container { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #e8f5e9; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        .badge-info { background: #e3f2fd; color: #1565c0; }
        .badge-success { background: #c8e6c9; color: #2e7d32; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><span>🧑‍🏫</span> Asistente Escolar</h1>
        <span id="status">Conectando...</span>
    </div>
    <div class="tabs">
        <div class="tab active" id="tab-chat">💬 Chat</div>
        <div class="tab" id="tab-admin">⚙️ Administración</div>
    </div>

    <div class="panel" id="panel-chat">
        <div class="chat-messages" id="chatMessages"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="pregunta" placeholder="Pregunta, crea eventos, recordatorios o notas..." style="flex:1;">
            <button onclick="enviarPregunta()">Enviar</button>
        </div>
        <small style="color:#666; display:block; margin-top:5px;">
            💡 Di: "Crea una nota sobre..." o "Recuerda que..." para guardar información nueva.
        </small>
    </div>

    <div class="panel admin-section" id="panel-admin">
        <div style="margin-bottom:20px; display: flex; flex-wrap: wrap; gap: 5px;">
            <span class="subtab active" data-section="tutores">Grupos y Tutores</span>
            <span class="subtab" data-section="comisiones">Comisiones</span>
            <span class="subtab" data-section="eventos">Eventos</span>
            <span class="subtab" data-section="notas">📝 Notas</span>
            <span class="subtab" data-section="recordatorios">🔔 Recordatorios</span>
            <span class="subtab" data-section="reuniones">Reuniones</span>
            <span class="subtab" data-section="calendario">Calendario</span>
            <span class="subtab" data-section="periodico">Periódico Mural</span>
            <span class="subtab" data-section="config">⚙️ Configuración</span>
        </div>
        <div id="seccionesAdmin"></div>
    </div>
</div>

<script>
    // ========== FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyBoM-z0NBs21tDAhcz91mQhRQshraUNDpg",
        authDomain: "asistente-escolar-c08e8.firebaseapp.com",
        projectId: "asistente-escolar-c08e8",
        storageBucket: "asistente-escolar-c08e8.firebasestorage.app",
        messagingSenderId: "137805187168",
        appId: "1:137805187168:web:6d92d4e9efa63c683d9b05",
        measurementId: "G-8TGGH1Z5C1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let groqApiKey = '';

    // PWA Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `
                var CACHE_NAME = 'asistente-escolar-v4';
                self.addEventListener('install', e => e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['./']))));
                self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
            `;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        });
    }

    // ==================== INICIALIZACIÓN ====================
    document.addEventListener('DOMContentLoaded', () => {
        cargarConfigInicial();
        setupTabs();
    });

    function setupTabs() {
        document.getElementById('tab-chat').addEventListener('click', () => cambiarTab('chat'));
        document.getElementById('tab-admin').addEventListener('click', () => cambiarTab('admin'));
        document.querySelectorAll('.subtab').forEach(el => {
            el.addEventListener('click', (e) => {
                document.querySelectorAll('.subtab').forEach(s => s.classList.remove('active'));
                e.target.classList.add('active');
                mostrarSeccionAdmin(e.target.dataset.section);
            });
        });
    }

    function cambiarTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('panel-chat').style.display = tab === 'chat' ? 'block' : 'none';
        document.getElementById('panel-admin').style.display = tab === 'admin' ? 'block' : 'none';
        if (tab === 'admin') mostrarSeccionAdmin('tutores');
    }

    async function cargarConfigInicial() {
        try {
            const docRef = db.collection('config').doc('admin');
            const doc = await docRef.get();
            if (!doc.exists) await docRef.set({ groqApiKey: '' });
            const data = (await docRef.get()).data();
            if (data && data.groqApiKey) groqApiKey = data.groqApiKey;
            document.getElementById('status').innerText = '✅ Listo';
        } catch (e) {
            document.getElementById('status').innerText = '❌ Error Firebase';
        }
    }

    function mostrarSeccionAdmin(seccion) {
        const cont = document.getElementById('seccionesAdmin');
        cont.innerHTML = '';
        switch (seccion) {
            case 'tutores': cargarAdminTutores(cont); break;
            case 'comisiones': cargarAdminComisiones(cont); break;
            case 'eventos': cargarAdminEventos(cont); break;
            case 'notas': cargarAdminNotas(cont); break;
            case 'recordatorios': cargarAdminRecordatorios(cont); break;
            case 'reuniones': cargarAdminReuniones(cont); break;
            case 'calendario': cargarAdminCalendario(cont); break;
            case 'periodico': cargarAdminPeriodico(cont); break;
            case 'config': cargarAdminConfig(cont); break;
        }
    }

    // ==================== ADMIN: TUTORES ====================
    async function cargarAdminTutores(container) {
        const grupos = ['1A','1B','1C','2A','2B','2C','3A','3B','3C'];
        container.innerHTML = '<h3>Grupos y Tutores</h3><div class="table-container"><table id="tablaTutores"><thead><tr><th>Grupo</th><th>Tutores</th><th>Acción</th></tr></thead><tbody></tbody></table></div><button onclick="nuevoTutor()">Agregar tutor a grupo</button>';
        const snapshot = await db.collection('grupos').get();
        const data = {};
        snapshot.forEach(doc => data[doc.id] = doc.data().tutores || []);
        const tbody = document.querySelector('#tablaTutores tbody');
        grupos.forEach(grupo => {
            const tutores = data[grupo] || [];
            const lista = tutores.map(t => `${t.nombre} (${t.rol})`).join(', ');
            tbody.innerHTML += `<tr><td>${grupo}</td><td>${lista || 'Sin tutores'}</td><td><button onclick="editarTutores('${grupo}')">Editar</button></td></tr>`;
        });
    }

    async function editarTutores(grupo) {
        const doc = await db.collection('grupos').doc(grupo).get();
        let tutores = doc.exists ? (doc.data().tutores || []) : [];
        window.tempTutores = tutores;
        window.tempGrupo = grupo;
        let html = `<h3>Editando tutores de ${grupo}</h3>`;
        tutores.forEach((t, index) => {
            html += `<div style="display:flex; gap:10px; margin-bottom:5px;">
                <input value="${t.nombre}" id="tnombre${index}" placeholder="Nombre" style="flex:2">
                <input value="${t.rol}" id="trol${index}" placeholder="Rol (Tutor, Auxiliar, etc.)" style="flex:1">
                <button onclick="eliminarTutor(${index})">❌</button>
            </div>`;
        });
        html += `<div id="nuevosTutores"></div>
                <button onclick="agregarFilaTutor()">+ Agregar tutor</button>
                <button onclick="guardarTutores('${grupo}')">Guardar</button>`;
        document.getElementById('seccionesAdmin').innerHTML = html;
    }

    function agregarFilaTutor() {
        const div = document.getElementById('nuevosTutores');
        const idx = window.tempTutores.length;
        div.innerHTML += `<div style="display:flex; gap:10px; margin-bottom:5px;">
            <input id="tnombre${idx}" placeholder="Nombre" style="flex:2">
            <input id="trol${idx}" placeholder="Rol" style="flex:1">
        </div>`;
        window.tempTutores.push({nombre:'', rol:''});
    }

    function eliminarTutor(index) {
        window.tempTutores.splice(index,1);
        editarTutores(window.tempGrupo);
    }

    async function guardarTutores(grupo) {
        const tutores = [];
        for (let i=0; i<window.tempTutores.length; i++) {
            const nombre = document.getElementById('tnombre'+i)?.value || '';
            const rol = document.getElementById('trol'+i)?.value || '';
            if (nombre.trim()) tutores.push({nombre, rol});
        }
        await db.collection('grupos').doc(grupo).set({tutores}, {merge:true});
        alert('Guardado');
        mostrarSeccionAdmin('tutores');
    }

    function nuevoTutor() {
        const grupo = prompt('Nombre del grupo (ej. 1A):');
        if (grupo) editarTutores(grupo);
    }

    // ==================== ADMIN: COMISIONES ====================
    const CARGOS_FIJOS = ["Presidente", "Vocal", "Tesorero", "Auxiliar", "Asesor", "Tesorero Auxiliar"];

    async function cargarAdminComisiones(container) {
        container.innerHTML = '<h3>Comisiones</h3><select id="selComision"></select><button onclick="cargarFormComision()">Cargar/Editar</button><button onclick="nuevaComision()">Nueva comisión</button><div id="formComision"></div>';
        const sel = document.getElementById('selComision');
        const snapshot = await db.collection('comisiones').get();
        sel.innerHTML = '';
        snapshot.forEach(doc => {
            const data = doc.data();
            sel.innerHTML += `<option value="${doc.id}">${data.nombre || doc.id}</option>`;
        });
        if (sel.options.length > 0) cargarFormComision();
    }

    async function cargarFormComision() {
        const id = document.getElementById('selComision').value;
        if (!id) return;
        const doc = await db.collection('comisiones').doc(id).get();
        const data = doc.exists ? doc.data() : {nombre: id, cargos:{}};
        let cargos = data.cargos || {};
        let html = `<h4>${data.nombre}</h4>`;
        CARGOS_FIJOS.forEach(cargo => {
            html += `<div class="form-group"><label>${cargo}:</label><input id="cargo_${cargo}" value="${cargos[cargo] || ''}"></div>`;
        });
        html += '<div id="cargosExtra"></div><button onclick="agregarCargoExtra()">+ Agregar otro cargo</button><br><button onclick="guardarComision(\''+id+'\')">Guardar</button>';
        document.getElementById('formComision').innerHTML = html;
        window.cargosExtra = [];
        for (let key in cargos) {
            if (!CARGOS_FIJOS.includes(key)) {
                window.cargosExtra.push({cargo: key, nombre: cargos[key]});
            }
        }
        renderCargosExtra();
    }

    function renderCargosExtra() {
        const div = document.getElementById('cargosExtra');
        div.innerHTML = '';
        window.cargosExtra.forEach((item, i) => {
            div.innerHTML += `<div style="display:flex; gap:5px;"><input id="extCargo${i}" value="${item.cargo}" placeholder="Cargo"><input id="extNombre${i}" value="${item.nombre}" placeholder="Nombre"><button onclick="eliminarCargoExtra(${i})">X</button></div>`;
        });
    }

    function agregarCargoExtra() { window.cargosExtra.push({cargo:'', nombre:''}); renderCargosExtra(); }
    function eliminarCargoExtra(i) { window.cargosExtra.splice(i,1); renderCargosExtra(); }

    async function guardarComision(id) {
        const cargos = {};
        CARGOS_FIJOS.forEach(cargo => {
            const val = document.getElementById('cargo_'+cargo).value.trim();
            if (val) cargos[cargo] = val;
        });
        window.cargosExtra.forEach((item, i) => {
            const cargo = document.getElementById('extCargo'+i)?.value.trim();
            const nombre = document.getElementById('extNombre'+i)?.value.trim();
            if (cargo && nombre) cargos[cargo] = nombre;
        });
        const nombre = document.getElementById('selComision').selectedOptions[0].text;
        await db.collection('comisiones').doc(id).set({nombre, cargos});
        alert('Guardado');
        mostrarSeccionAdmin('comisiones');
    }

    function nuevaComision() {
        const nombre = prompt('Nombre de la nueva comisión:');
        if (nombre) {
            const id = nombre.toLowerCase().replace(/\s+/g,'_');
            db.collection('comisiones').doc(id).set({nombre, cargos:{}});
            alert('Creada, recarga la sección');
            mostrarSeccionAdmin('comisiones');
        }
    }

    // ==================== ADMIN: EVENTOS ====================
    function cargarAdminEventos(container) {
        container.innerHTML = '<h3>Eventos</h3><div id="listaEventos"></div><hr><h4>Agregar evento</h4><input id="evNombre" placeholder="Nombre"><input id="evFecha" type="date"><input id="evTipo" placeholder="Tipo"><input id="evEncargado" placeholder="Encargado"><button onclick="agregarEvento()">Guardar</button>';
        cargarListaEventos();
    }
    async function cargarListaEventos() {
        const snap = await db.collection('eventos').get();
        let html = '<ul>';
        snap.forEach(doc => {
            const d = doc.data();
            html += `<li>${d.nombre} - ${d.fecha} (${d.tipo}) - ${d.encargado} <button onclick="eliminarDocumento('eventos','${doc.id}')">X</button></li>`;
        });
        html += '</ul>';
        document.getElementById('listaEventos').innerHTML = html;
    }
    async function agregarEvento() {
        const nombre = document.getElementById('evNombre').value;
        const fecha = document.getElementById('evFecha').value;
        const tipo = document.getElementById('evTipo').value;
        const encargado = document.getElementById('evEncargado').value;
        if (nombre && fecha) {
            await db.collection('eventos').add({nombre, fecha, tipo, encargado});
            cargarListaEventos();
        }
    }

    // ==================== ADMIN: NOTAS (NUEVO) ====================
    function cargarAdminNotas(container) {
        container.innerHTML = `
            <h3>📝 Notas Personalizadas</h3>
            <p style="color:#666; margin-bottom:15px;">Estas notas se incluyen en el contexto del asistente. Úsalas para agregar información temporal o recordatorios.</p>
            <div id="listaNotas"></div>
            <hr>
            <h4>Agregar Nota</h4>
            <div class="form-group">
                <label>Título (opcional):</label>
                <input id="notaTitulo" placeholder="Ej: Permiso profe Juan">
            </div>
            <div class="form-group">
                <label>Contenido:</label>
                <textarea id="notaContenido" placeholder="Escribe la información que quieres que el asistente recuerde..."></textarea>
            </div>
            <button onclick="agregarNota()" class="btn-note">📝 Guardar Nota</button>
        `;
        cargarListaNotas();
    }

    async function cargarListaNotas() {
        const snap = await db.collection('notas').orderBy('creado', 'desc').get();
        let html = '<div style="display:flex; flex-direction:column; gap:10px;">';
        snap.forEach(doc => {
            const n = doc.data();
            html += `<div style="background:#fff3e0; padding:10px; border-radius:8px; border-left:4px solid #f57c00;">
                <strong>${n.titulo || 'Sin título'}</strong>
                <span class="badge badge-info">${new Date(n.creado).toLocaleDateString()}</span>
                <p>${n.contenido}</p>
                <small style="color:#888;">ID: ${doc.id}</small>
                <button onclick="eliminarDocumento('notas','${doc.id}')">🗑️</button>
            </div>`;
        });
        html += '</div>';
        document.getElementById('listaNotas').innerHTML = html || '<p>No hay notas aún.</p>';
    }

    async function agregarNota() {
        const titulo = document.getElementById('notaTitulo').value.trim();
        const contenido = document.getElementById('notaContenido').value.trim();
        if (!contenido) { alert('El contenido es obligatorio.'); return; }
        await db.collection('notas').add({
            titulo: titulo || 'Sin título',
            contenido,
            creado: new Date().toISOString()
        });
        alert('✅ Nota guardada. El asistente ahora la incluirá en sus respuestas.');
        cargarListaNotas();
        document.getElementById('notaTitulo').value = '';
        document.getElementById('notaContenido').value = '';
    }

    // ==================== ADMIN: RECORDATORIOS ====================
    function cargarAdminRecordatorios(container) {
        container.innerHTML = `
            <h3>🔔 Recordatorios</h3>
            <div id="listaRecordatorios"></div>
            <hr>
            <h4>Nuevo Recordatorio</h4>
            <input id="recTitulo" placeholder="Título"><br><br>
            <textarea id="recDesc" placeholder="Descripción"></textarea><br><br>
            <input id="recFecha" type="date"><br><br>
            <input id="recHora" type="time" placeholder="Hora (opcional)"><br><br>
            <button onclick="agregarRecordatorio()">🔔 Guardar Recordatorio</button>
        `;
        cargarListaRecordatorios();
    }
    async function cargarListaRecordatorios() {
        const snap = await db.collection('recordatorios').orderBy('fecha', 'desc').get();
        let html = '<ul>';
        snap.forEach(doc => {
            const r = doc.data();
            html += `<li>${r.titulo} - ${r.fecha} ${r.hora||''} <button onclick="eliminarDocumento('recordatorios','${doc.id}')">X</button></li>`;
        });
        html += '</ul>';
        document.getElementById('listaRecordatorios').innerHTML = html || '<p>Sin recordatorios.</p>';
    }
    async function agregarRecordatorio() {
        const titulo = document.getElementById('recTitulo').value.trim();
        const desc = document.getElementById('recDesc').value.trim();
        const fecha = document.getElementById('recFecha').value;
        const hora = document.getElementById('recHora').value;
        if (!titulo || !fecha) { alert('Título y fecha obligatorios.'); return; }
        await db.collection('recordatorios').add({titulo, descripcion: desc, fecha, hora, enviado: false, creado: new Date().toISOString()});
        alert('✅ Recordatorio guardado.');
        cargarListaRecordatorios();
    }

    // ==================== ADMIN: REUNIONES ====================
    function cargarAdminReuniones(container) {
        container.innerHTML = '<h3>Reuniones</h3><div id="listaReuniones"></div><hr><h4>Agregar</h4><input id="reuTipo" placeholder="Tipo"><input id="reuFecha" type="date"><input id="reuHora" placeholder="Hora"><input id="reuLugar" placeholder="Lugar"><button onclick="agregarReunion()">Guardar</button>';
        cargarListaReuniones();
    }
    async function cargarListaReuniones() {
        const snap = await db.collection('reuniones').get();
        let html = '<ul>';
        snap.forEach(doc => {
            const d = doc.data();
            html += `<li>${d.tipo} - ${d.fecha} ${d.hora} (${d.lugar}) <button onclick="eliminarDocumento('reuniones','${doc.id}')">X</button></li>`;
        });
        html += '</ul>';
        document.getElementById('listaReuniones').innerHTML = html;
    }
    async function agregarReunion() {
        const tipo = document.getElementById('reuTipo').value;
        const fecha = document.getElementById('reuFecha').value;
        const hora = document.getElementById('reuHora').value;
        const lugar = document.getElementById('reuLugar').value;
        if (tipo && fecha) {
            await db.collection('reuniones').add({tipo, fecha, hora, lugar});
            cargarListaReuniones();
        }
    }

    // ==================== ADMIN: CALENDARIO ====================
    function cargarAdminCalendario(container) {
        container.innerHTML = '<h3>Calendario Escolar</h3><div id="calendarioActual"></div><button onclick="editarCalendario()">Editar</button>';
        cargarCalendario();
    }
    async function cargarCalendario() {
        const doc = await db.collection('calendario').doc('info').get();
        const d = doc.exists ? doc.data() : {};
        document.getElementById('calendarioActual').innerHTML = `
            <p>URL SEP: ${d.url_sep || '-'}</p>
            <p>Inicio ciclo: ${d.inicio || '-'}</p>
            <p>Fin ciclo: ${d.fin || '-'}</p>
            <p>Promoción escolar: ${d.promocion || '-'}</p>
            <p>Entrega doc. inicio: ${d.doc_inicio || '-'}</p>
            <p>Entrega doc. cierre: ${d.doc_cierre || '-'}</p>
        `;
    }
    async function editarCalendario() {
        const doc = await db.collection('calendario').doc('info').get();
        const d = doc.exists ? doc.data() : {};
        document.getElementById('calendarioActual').innerHTML = `
            <input id="calUrl" value="${d.url_sep || ''}" placeholder="URL SEP"><br>
            <input id="calInicio" type="date" value="${d.inicio || ''}"><br>
            <input id="calFin" type="date" value="${d.fin || ''}"><br>
            <input id="calPromo" type="date" value="${d.promocion || ''}"><br>
            <input id="calDocIni" type="date" value="${d.doc_inicio || ''}"><br>
            <input id="calDocCie" type="date" value="${d.doc_cierre || ''}"><br>
            <button onclick="guardarCalendario()">Guardar</button>
        `;
    }
    async function guardarCalendario() {
        await db.collection('calendario').doc('info').set({
            url_sep: document.getElementById('calUrl').value,
            inicio: document.getElementById('calInicio').value,
            fin: document.getElementById('calFin').value,
            promocion: document.getElementById('calPromo').value,
            doc_inicio: document.getElementById('calDocIni').value,
            doc_cierre: document.getElementById('calDocCie').value
        });
        alert('Calendario actualizado');
        cargarCalendario();
    }

    // ==================== ADMIN: PERIÓDICO MURAL ====================
    function cargarAdminPeriodico(container) {
        container.innerHTML = '<h3>Periódico Mural</h3><div id="listaPeriodico"></div><hr><input id="perMes" placeholder="Mes"><input id="perEncargado" placeholder="Encargado"><input id="perTema" placeholder="Tema"><button onclick="agregarPeriodico()">Agregar</button>';
        cargarListaPeriodico();
    }
    async function cargarListaPeriodico() {
        const snap = await db.collection('periodico_mural').get();
        let html = '<ul>';
        snap.forEach(doc => {
            const d = doc.data();
            html += `<li>${d.mes}: ${d.encargado} (${d.tema||''}) <button onclick="eliminarDocumento('periodico_mural','${doc.id}')">X</button></li>`;
        });
        html += '</ul>';
        document.getElementById('listaPeriodico').innerHTML = html;
    }
    async function agregarPeriodico() {
        const mes = document.getElementById('perMes').value;
        const encargado = document.getElementById('perEncargado').value;
        const tema = document.getElementById('perTema').value;
        if (mes && encargado) {
            await db.collection('periodico_mural').add({mes, encargado, tema});
            cargarListaPeriodico();
        }
    }

    // ==================== ADMIN: CONFIGURACIÓN ====================
    function cargarAdminConfig(container) {
        container.innerHTML = `<h3>Configuración</h3>
            <label>API Key de Groq:</label><input id="groqKeyInput" value="${groqApiKey}"><br><br>
            <button onclick="guardarConfig()">Guardar API Key</button>`;
    }
    async function guardarConfig() {
        groqApiKey = document.getElementById('groqKeyInput').value.trim();
        await db.collection('config').doc('admin').set({groqApiKey: groqApiKey}, {merge: true});
        alert('API Key guardada.');
    }

    async function eliminarDocumento(coleccion, id) {
        if (confirm('Eliminar?')) {
            await db.collection(coleccion).doc(id).delete();
            mostrarSeccionAdmin(document.querySelector('.subtab.active').dataset.section);
        }
    }

    // ==================== CHAT PRINCIPAL ====================
    async function construirContexto() {
        let texto = "INFORMACIÓN DE LA ESCUELA:\n";
        // Grupos
        const grpSnap = await db.collection('grupos').get();
        texto += "\n## Grupos y tutores:\n";
        grpSnap.forEach(d => {
            const t = d.data().tutores || [];
            texto += `- ${d.id}: ${t.map(x=>`${x.nombre} (${x.rol})`).join(', ')}\n`;
        });
        // Comisiones
        const comSnap = await db.collection('comisiones').get();
        texto += "\n## Comisiones:\n";
        comSnap.forEach(d => {
            const c = d.data();
            texto += `- ${c.nombre}: ${c.cargos ? Object.entries(c.cargos).map(([k,v])=>`${k}: ${v}`).join(', ') : 'Sin cargos'}\n`;
        });
        // Eventos
        const evtSnap = await db.collection('eventos').get();
        texto += "\n## Eventos:\n";
        evtSnap.forEach(d => {
            const e = d.data();
            texto += `- ID: ${d.id} | ${e.nombre} | ${e.fecha} | ${e.tipo || ''} | Encargado: ${e.encargado || ''}\n`;
        });
        // NOTAS (NUEVO) - Se incluyen en el contexto
        const notasSnap = await db.collection('notas').get();
        texto += "\n## 📝 NOTAS IMPORTANTES (información adicional):\n";
        if (notasSnap.empty) {
            texto += "- No hay notas adicionales.\n";
        } else {
            notasSnap.forEach(d => {
                const n = d.data();
                texto += `- [${n.titulo || 'Nota'}]: ${n.contenido} (Creada: ${new Date(n.creado).toLocaleDateString()})\n`;
            });
        }
        // Recordatorios
        const recSnap = await db.collection('recordatorios').get();
        texto += "\n## Recordatorios:\n";
        recSnap.forEach(d => {
            const r = d.data();
            texto += `- ID: ${d.id} | ${r.titulo} | ${r.fecha} | Enviado: ${r.enviado ? 'Sí' : 'No'}\n`;
        });
        // Reuniones
        const reuSnap = await db.collection('reuniones').orderBy('fecha').get();
        texto += "\n## Reuniones:\n";
        reuSnap.forEach(d => {
            const r = d.data();
            texto += `- ${r.tipo}: ${r.fecha} ${r.hora} (${r.lugar})\n`;
        });
        // Calendario
        const cal = await db.collection('calendario').doc('info').get();
        if (cal.exists) {
            const c = cal.data();
            texto += "\n## Calendario escolar:\n";
            texto += `URL SEP: ${c.url_sep || '-'}\nInicio: ${c.inicio||'-'}\nFin: ${c.fin||'-'}\nPromoción: ${c.promocion||'-'}\nDoc inicio: ${c.doc_inicio||'-'}\nDoc cierre: ${c.doc_cierre||'-'}\n`;
        }
        // Periódico mural
        const perSnap = await db.collection('periodico_mural').get();
        texto += "\n## Periódico Mural:\n";
        perSnap.forEach(d => {
            const p = d.data();
            texto += `- ${p.mes}: ${p.encargado} (${p.tema||''})\n`;
        });
        return texto;
    }

    async function procesarAccionChat(json) {
        const { tipo, accion, datos } = json;
        
        if (tipo === 'nota') {
            if (accion === 'crear') {
                await db.collection('notas').add({
                    titulo: datos.titulo || 'Nota del chat',
                    contenido: datos.contenido,
                    creado: new Date().toISOString()
                });
                return `✅ Nota guardada: "${datos.titulo || 'Sin título'}". El asistente ahora la recordará.`;
            }
        }
        
        if (tipo === 'evento') {
            if (accion === 'crear') {
                await db.collection('eventos').add(datos);
                return `✅ Evento "${datos.nombre}" creado.`;
            } else if (accion === 'modificar') {
                const id = datos.id;
                if (!id) return "❌ Necesito el ID del evento.";
                const copia = {...datos}; delete copia.id;
                await db.collection('eventos').doc(id).update(copia);
                return `✅ Evento modificado.`;
            } else if (accion === 'eliminar') {
                await db.collection('eventos').doc(datos.id).delete();
                return `✅ Evento eliminado.`;
            }
        }
        
        if (tipo === 'recordatorio') {
            if (accion === 'crear') {
                await db.collection('recordatorios').add({...datos, enviado: false});
                return `✅ Recordatorio "${datos.titulo}" programado para ${datos.fecha}.`;
            }
        }
        
        return "❌ Acción no reconocida por el sistema.";
    }

    async function enviarPregunta() {
        const pregunta = document.getElementById('pregunta').value.trim();
        if (!pregunta) return;
        if (!groqApiKey) { alert('Configura la API Key de Groq en Administración > Configuración.'); return; }
        
        const chatDiv = document.getElementById('chatMessages');
        chatDiv.innerHTML += `<div class="msg user-msg">
            <div class="bubble user-bubble">👤 ${pregunta}</div>
            <div class="avatar">👤</div>
        </div>`;
        document.getElementById('pregunta').value = '';
        chatDiv.innerHTML += `<div class="msg assistant-msg" id="tempAssistant">
            <div class="avatar">🧑‍🏫</div>
            <div class="bubble assistant-bubble">Pensando...</div>
        </div>`;
        chatDiv.scrollTop = chatDiv.scrollHeight;

        const contexto = await construirContexto();
        const systemMsg = `Eres un asistente de una secundaria en México. Responde ÚNICAMENTE con la información proporcionada.

Si el usuario QUIERE CREAR UNA NOTA (información nueva que debe ser recordada), devuelve SOLO ESTE JSON:
{"tipo":"nota","accion":"crear","datos":{"titulo":"Título corto","contenido":"Información detallada que el usuario quiere guardar"}}

Para EVENTOS:
- Crear: {"tipo":"evento","accion":"crear","datos":{"nombre":"...", "fecha":"YYYY-MM-DD", "tipo":"...", "encargado":"..."}}
- Modificar: {"tipo":"evento","accion":"modificar","datos":{"id":"ID", ...campos a cambiar}}
- Eliminar: {"tipo":"evento","accion":"eliminar","datos":{"id":"ID"}}

Para RECORDATORIOS:
- Crear: {"tipo":"recordatorio","accion":"crear","datos":{"titulo":"...", "fecha":"YYYY-MM-DD", "hora":"HH:MM", "descripcion":"..."}}

Si falta información, pídela amablemente. En cualquier otro caso, responde normal.

Contexto actual:\n${contexto}`;

        try {
            const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${groqApiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [{role: "system", content: systemMsg}, {role: "user", content: pregunta}],
                    temperature: 0.1,
                    max_tokens: 500
                })
            });
            const data = await resp.json();
            let respuesta = data.choices[0].message.content.trim();

            // Detectar si es un JSON de acción
            if (respuesta.startsWith('{')) {
                try {
                    const json = JSON.parse(respuesta);
                    if (json.accion && json.datos && json.tipo) {
                        respuesta = await procesarAccionChat(json);
                    }
                } catch (e) {}
            }

            document.getElementById('tempAssistant').querySelector('.bubble').innerHTML = respuesta;
            document.getElementById('tempAssistant').removeAttribute('id');
        } catch (e) {
            document.getElementById('tempAssistant').querySelector('.bubble').innerHTML = '❌ Error de comunicación.';
        }
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    document.getElementById('pregunta').addEventListener('keypress', e => {
        if (e.key === 'Enter') enviarPregunta();
    });
</script>
