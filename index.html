    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; color: #1a1a1a; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .header { background: #1b5e20; color: white; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; background: #e0e0e0; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab.active { background: #1b5e20; color: white; }
        .panel { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .chat-messages { height: 400px; overflow-y: auto; border: 1px solid #ccc; border-radius: 10px; padding: 15px; margin-bottom: 15px; background: #fafafa; }
        .msg { margin-bottom: 15px; display: flex; align-items: flex-start; gap: 10px; }
        .user-msg { justify-content: flex-end; }
        .assistant-msg { justify-content: flex-start; }
        .avatar { font-size: 2rem; min-width: 40px; text-align: center; }
        .bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; word-wrap: break-word; }

        .assistant-bubble { background: #e8f5e9; color: #1b5e20; }
        input, textarea, select, button { padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 0.95rem; }
        button { background: #1b5e20; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #2e7d32; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .subtab { display: inline-block; padding: 8px 15px; background: #e0e0e0; border-radius: 15px; cursor: pointer; margin-right: 10px; }
        .subtab.active { background: #1b5e20; color: white; }
        .table-container { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }

<body>
<div class="container">
    <div class="header">
        <h1><span>🧑‍🏫</span> Asistente Escolar</h1>
        <span id="status">Conectando...</span>
    </div>
    <div class="tabs">
        <div class="tab active" id="tab-chat">💬 Chat</div>
        <div class="tab" id="tab-admin">⚙️ Administración</div>
    </div>

    <div class="panel" id="panel-chat">
        <div class="chat-messages" id="chatMessages"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="pregunta" placeholder="Pregunta o pide crear/modificar eventos..." style="flex:1;">
            <button onclick="enviarPregunta()">Enviar</button>
        </div>
    </div>

    <div class="panel admin-section" id="panel-admin">
        <div style="margin-bottom:20px;">
            <span class="subtab active" data-section="tutores">Grupos y Tutores</span>
            <span class="subtab" data-section="comisiones">Comisiones</span>
            <span class="subtab" data-section="eventos">Eventos</span>
            <span class="subtab" data-section="reuniones">Reuniones</span>
            <span class="subtab" data-section="calendario">Calendario</span>
            <span class="subtab" data-section="periodico">Periódico Mural</span>
            <span class="subtab" data-section="config">⚙️ Configuración</span>
        </div>
        <div id="seccionesAdmin"></div>
    </div>
</div>

<script>
    // ========== FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyBoM-z0NBs21tDAhcz91mQhRQshraUNDpg",
        authDomain: "asistente-escolar-c08e8.firebaseapp.com",
        projectId: "asistente-escolar-c08e8",
        storageBucket: "asistente-escolar-c08e8.firebasestorage.app",
        messagingSenderId: "137805187168",
        appId: "1:137805187168:web:6d92d4e9efa63c683d9b05",
        measurementId: "G-8TGGH1Z5C1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let groqApiKey = '';

    // PWA Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `
                var CACHE_NAME = 'asistente-escolar-v2';
                self.addEventListener('install', e => e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['./']))));
                self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
            `;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        cargarConfigInicial();
        setupTabs();
    });

    function setupTabs() {
        document.getElementById('tab-chat').addEventListener('click', () => cambiarTab('chat'));
        document.getElementById('tab-admin').addEventListener('click', () => cambiarTab('admin'));
        document.querySelectorAll('.subtab').forEach(el => {
            el.addEventListener('click', (e) => {
                document.querySelectorAll('.subtab').forEach(s => s.classList.remove('active'));
                e.target.classList.add('active');
                mostrarSeccionAdmin(e.target.dataset.section);
            });
        });
    }

    function cambiarTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('panel-chat').style.display = tab === 'chat' ? 'block' : 'none';
        document.getElementById('panel-admin').style.display = tab === 'admin' ? 'block' : 'none';
        if (tab === 'admin') mostrarSeccionAdmin('tutores');
    }

    async function cargarConfigInicial() {
        try {
            const docRef = db.collection('config').doc('admin');
            const doc = await docRef.get();
            if (!doc.exists) await docRef.set({ groqApiKey: '' });
            const data = (await docRef.get()).data();
            if (data && data.groqApiKey) groqApiKey = data.groqApiKey;
            document.getElementById('status').innerText = '✅ Listo';
        } catch (e) {
            document.getElementById('status').innerText = '❌ Error Firebase';
        }
    }

    function mostrarSeccionAdmin(seccion) {
        const cont = document.getElementById('seccionesAdmin');
        cont.innerHTML = '';
        switch (seccion) {
            case 'tutores': cargarAdminTutores(cont); break;
            case 'comisiones': cargarAdminComisiones(cont); break;
            case 'eventos': cargarAdminEventos(cont); break;
            case 'reuniones': cargarAdminReuniones(cont); break;
            case 'calendario': cargarAdminCalendario(cont); break;
            case 'periodico': cargarAdminPeriodico(cont); break;
            case 'config': cargarAdminConfig(cont); break;
        }
    }

    // ==================== ADMIN SECCIONES (sin cambios) ====================
    // (El código de tutores, comisiones, reuniones, calendario, periodico, config 
    //  es exactamente igual que en la versión anterior. Por brevedad no lo repito,
    //  pero debes mantenerlo íntegro en tu archivo. 
    //  Solo copia y pega todo lo que está desde "async function cargarAdminTutores..." 
    //  hasta "async function eliminarDocumento..." de la versión completa anterior.
    //  Yo aquí incluyo directamente la parte nueva del chat con la gestión de eventos.)

    // ---------- NUEVO: Gestión de eventos desde el chat ----------
    async function procesarAccionEvento(accion, datos) {
        if (accion === 'crear') {
            await db.collection('eventos').add(datos);
            return `✅ Evento "${datos.nombre}" creado correctamente.`;
        } else if (accion === 'modificar') {
            const id = datos.id;
            if (!id) return "❌ Necesito el ID del evento para modificarlo.";
            const copia = {...datos};
            delete copia.id;
            await db.collection('eventos').doc(id).update(copia);
            return `✅ Evento modificado exitosamente.`;
        } else if (accion === 'eliminar') {
            const id = datos.id;
            if (!id) return "❌ Necesito el ID del evento para eliminarlo.";
            await db.collection('eventos').doc(id).delete();
            return `✅ Evento eliminado.`;
        }
        return "❌ Acción no reconocida.";
    }

    async function construirContexto() {
        let texto = "Información actual de la escuela:\n";
        // Grupos
        const grpSnap = await db.collection('grupos').get();
        texto += "\n## Grupos y tutores:\n";
        grpSnap.forEach(d => {
            const t = d.data().tutores || [];
            texto += `- ${d.id}: ${t.map(x=>`${x.nombre} (${x.rol})`).join(', ')}\n`;
        });
        // Comisiones
        const comSnap = await db.collection('comisiones').get();
        texto += "\n## Comisiones:\n";
        comSnap.forEach(d => {
            const c = d.data();
            texto += `- ${c.nombre}: ${c.cargos ? Object.entries(c.cargos).map(([k,v])=>`${k}: ${v}`).join(', ') : 'Sin cargos'}\n`;
        });
        // Eventos (incluir IDs para modificar/eliminar)
        const evtSnap = await db.collection('eventos').get();
        texto += "\n## Eventos:\n";
        evtSnap.forEach(d => {
            const e = d.data();
            texto += `- ID: ${d.id} | ${e.nombre} | ${e.fecha} | ${e.tipo || ''} | Encargado: ${e.encargado || ''}\n`;
        });
        // Reuniones
        const reuSnap = await db.collection('reuniones').orderBy('fecha').get();
        texto += "\n## Reuniones:\n";
        reuSnap.forEach(d => {
            const r = d.data();
            texto += `- ${r.tipo}: ${r.fecha} ${r.hora} (${r.lugar})\n`;
        });
        // Calendario
        const cal = await db.collection('calendario').doc('info').get();
        if (cal.exists) {
            const c = cal.data();
            texto += "\n## Calendario escolar:\n";
            texto += `URL SEP: ${c.url_sep || '-'}\nInicio: ${c.inicio||'-'}\nFin: ${c.fin||'-'}\nPromoción: ${c.promocion||'-'}\nDoc inicio: ${c.doc_inicio||'-'}\nDoc cierre: ${c.doc_cierre||'-'}\n`;
        }
        // Periódico mural
        const perSnap = await db.collection('periodico_mural').get();
        texto += "\n## Periódico Mural:\n";
        perSnap.forEach(d => {
            const p = d.data();
            texto += `- ${p.mes}: ${p.encargado} (${p.tema||''})\n`;
        });
        return texto;
    }

    async function enviarPregunta() {
        const pregunta = document.getElementById('pregunta').value.trim();
        if (!pregunta) return;
        if (!groqApiKey) {
            alert('Configura primero la API Key de Groq en Administración > Configuración.');
            return;
        }
        const chatDiv = document.getElementById('chatMessages');
        // Mostrar pregunta del usuario
        chatDiv.innerHTML += `<div class="msg user-msg">
            <div class="bubble user-bubble">👤 ${pregunta}</div>
            <div class="avatar">👤</div>
        </div>`;
        document.getElementById('pregunta').value = '';
        // Placeholder del asistente
        chatDiv.innerHTML += `<div class="msg assistant-msg" id="tempAssistant">
            <div class="avatar">🧑‍🏫</div>
            <div class="bubble assistant-bubble">Pensando...</div>
        </div>`;
        chatDiv.scrollTop = chatDiv.scrollHeight;

        const contexto = await construirContexto();
        // Prompt especial para que la IA devuelva JSON si quiere gestionar eventos
        const systemMsg = `Eres un asistente de una secundaria en México. Responde con base en la información dada. 
Si el usuario quiere **crear, modificar o eliminar un evento**, NO des explicaciones, solo devuelve un JSON estrictamente con el siguiente formato, sin texto adicional:
- Para crear: {"accion":"crear","datos":{"nombre":"...", "fecha":"YYYY-MM-DD", "tipo":"...", "encargado":"..."}}
- Para modificar: {"accion":"modificar","datos":{"id":"ID del evento", "nombre":"...", "fecha":"...", "tipo":"...", "encargado":"..."}} (solo incluye los campos que se van a cambiar)
- Para eliminar: {"accion":"eliminar","datos":{"id":"ID del evento"}}
Si detectas que faltan datos para completar la acción, responde pidiendo los datos faltantes en texto normal.
En cualquier otro caso, responde normalmente en texto.
Contexto actual:\n${contexto}`;

        const messages = [
            {role: "system", content: systemMsg},
            {role: "user", content: pregunta}
        ];

        try {
            const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${groqApiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages,
                    temperature: 0.1,
                    max_tokens: 500
                })
            });
            const data = await resp.json();
            let respuesta = data.choices[0].message.content.trim();

            // Intentar interpretar JSON
            if (respuesta.startsWith('{')) {
                try {
                    const json = JSON.parse(respuesta);
                    if (json.accion && json.datos) {
                        const resultado = await procesarAccionEvento(json.accion, json.datos);
                        respuesta = resultado;
                    }
                } catch (e) {
                    // No era JSON válido, se muestra tal cual
                }
            }

            const tempMsg = document.getElementById('tempAssistant');
            tempMsg.querySelector('.bubble').innerHTML = respuesta;
            tempMsg.removeAttribute('id');
        } catch (e) {
            document.getElementById('tempAssistant').querySelector('.bubble').innerHTML = '❌ Error de comunicación.';
        }
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    document.getElementById('pregunta').addEventListener('keypress', e => {
        if (e.key === 'Enter') enviarPregunta();
    });

    // ==================== FUNCIONES DE ADMIN (debes incluirlas completas) ====================
    // AQUÍ PEGA TODAS LAS FUNCIONES DE ADMINISTRACIÓN QUE YA TENÍAS:
    // cargarAdminTutores, editarTutores, guardarTutores, etc.
    // cargarAdminComisiones, cargarFormComision, etc.
    // cargarAdminEventos, cargarAdminReuniones, cargarAdminCalendario, cargarAdminPeriodico, cargarAdminConfig...
    // Asegúrate de que estén todas para que el panel de administración funcione.
    // (Por espacio, no las repito aquí, pero debes copiarlas de la versión anterior completa.)

</script>
